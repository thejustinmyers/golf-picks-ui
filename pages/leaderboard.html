<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="../styles/leaderboard.css">
</head>

<body>
    <header class="top-header">
        <div class="header-container">
            <h1 class="logo">GolfPicks</h1>
            <nav class="nav-links">
                <a href="../index.html">Home</a>
            </nav>
        </div>
    </header>
    <div class="container">
        <div class="leaderboard-controls">
            <select id="season-dropdown" aria-label="Select season">
                <option value="2026" selected>2026</option>
                <option value="2025">2025</option>
            </select>
            <select id="tournament-dropdown">
                <option value="">Loading tournaments...</option>
            </select>
            <button id="fetchLeaderboard">Fetch Leaderboard</button>
        </div>
        <div id="leaderboards">
            <div id="leaderboard">
                <h2 id="leaderboard-h1" style="display: none;">Leaderboard</h2>
                <div class="table-container">
                    <table id="leaderboard-table"></table>
                </div>
            </div>
            <div id="golfpicks-data">
                <h2 id="golfpicks-data-h1" style="display: none;">Draft</h2>
                <div class="table-container">
                    <table id="golfpicks-table"></table>
                </div>
            </div>
            <div id="espn-leaderboard">
                <h2 id="espn-leaderboard-h1" style="display: none;">ESPN Leaderboard</h2>
                <div class="table-container">
                    <table id="espn-table"></table>
                </div>
                <div id="espn-placeholder" style="display: none;"></div>
            </div>
        </div>
    </div>
    <script src="../scripts/leaderboard.js"></script>
</body>

</html>
